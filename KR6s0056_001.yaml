body:
  text: 進旨皇帝聞語滿目流淚良久乃言和尚曰朕之小國總無供養上人數年在其內中朕且無心輕慢朕雖為人主濫處乾坤每謝上人來過小國伏願和尚慈悲更住三五日間得之已否遠公曰若夫涅槃之義本無攀緣若有攀緣皆屬妄想伏願陛下莫懷惆悵貧道有願歸山皇帝見他遠公語切便如情意難留有敕先報六宮暗裏排比祖送是時皇帝慕戀辟宰沖沖合國大臣同時祖送遠公上路離宮闕別龍樓望㠠山而路遠覩江河以逍遙是日遠公能涉長路而行遂即密現神通遠公既出長安足下雲生如壯士展臂須臾之間便至㠠山遠公亦也不歸舊寺相去十里已來於一峻嶺上權時結一草菴彼中結跏敷坐便即重尋舊卷再舉經聲荏苒之間又經數月遠公忽望高原乃喚此上其境峻峯鶴鳴澗下龍吟百谷千峯例皆花發地平長流之水薗開不朽之花是如來修行之處於是遠公正坐入其三昧然淨意澄心思惟佛道念浮生不久想凡世而無堪便將自性心王造一法船歸依上界遠公造船不用凡間料物也不要諸般自持無漏大乘已為纜索菩提般若用作拘欄金剛密迹已為開寶伍年張長繼書記
